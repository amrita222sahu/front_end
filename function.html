    function checkoddEven(){

  alert("Even Number");

}
    }
    function checkinvalidoperator(){
let num1 = Number(prompt("Enter first number:"));
let num2 = Number(prompt("Enter second number:"));
let op = prompt("Enter operator (+, -, *, /):");
let result;

if (op === "+") {
  result = num1 + num2;
} else if (op === "-") {
  result = num1 - num2;
} else if (op === "*") {
  result = num1 * num2;
} else if (op === "/") {
  result = num1 / num2;
} else {
  alert("Invalid operator");
}
    }
    function checkGrade(){
let marks = Number(prompt("Enter marks (0-100):"));
let grade;

if (marks >= 90 && marks <= 100) {
  grade = "A+";
} else if (marks >= 80) {
  grade = "A";
} else if (marks >= 70) {
  grade = "B";
} else if (marks >= 60) {
  grade = "C";
} else if (marks >= 50) {
  grade = "D";
} else {
  grade = "Fail";
}
    }

     let x = 5;

        console.log("x",x)
        console.log("y",y)

        let reverse = 0;
