<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let num1=Number(prompt("enter first number"));
        let num2=Number(prompt("enter second number"));
        let operator=prompt("enter operator(+,-,*,/):");

        let result;

        if (operator =="+"){
           result=num1+num2;
           alert (result);
        }else if (operator =="-"){
            result=num1-num2;
            alert (result);
        }else if (operator =="*"){
            result=num1*num2;
            alert (result);
        }else if (operator =="/"){
            if (num2 !=0){
            result=num1/num2;
            alert (result);
            }else{
                result="error!division by zero is allowed";
                alert(result);
            }
        }else{
            result="invalid operator";
            alert("result="+result);
        }
            

    </script>
</body>
</html>
